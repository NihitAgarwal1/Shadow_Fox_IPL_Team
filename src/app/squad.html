<div class="container">
  <!-- Top left logo -->
  <div class="logo-container" routerLink="/">
    <img src="/logo.png" alt="KKR Logo" class="logo">
  </div>

  <header class="header">
    <h1 class="title-text">KKR CURRENT SQUAD 2026</h1>
    <button class="back-btn" routerLink="/">Back to Home</button>
  </header>

  <main class="main-content">
    <div class="table-container">
      <table class="squad-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Player Name</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let player of players; let i = index">
            <td>{{ i + 1 }}</td>
            <td>
              <a [href]="getStatsUrl(player.name)" target="_blank" class="player-link">
                {{ player.name }}
              </a>
            </td>
            <td>{{ player.role }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<style>
