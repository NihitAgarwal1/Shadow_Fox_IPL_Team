<div class="container">
  <div class="logo-container" routerLink="/">
    <img src="/logo.png" alt="KKR Logo" class="logo">
  </div>

  <header class="header">
    <p class="eyebrow">Interactive Squad Hub</p>
    <h1 class="title-text">KKR Current Squad 2026</h1>
    <p class="subtitle">
      
    </p>
    <button class="back-btn" routerLink="/">Back to Home</button>
  </header>

  <main class="main-content">
    <section class="category-shell">
      <div class="category-tabs">
        <button
          *ngFor="let category of categories"
          type="button"
          class="category-tab"
          [class.active]="activeCategory === category.id"
          [class.locked]="!category.available || isModalOpen"
          [disabled]="!category.available || isModalOpen"
          (click)="setCategory(category.id, category.available)"
        >
          {{ category.label }}
          <span *ngIf="!category.available" class="tab-badge">Next</span>
        </button>
      </div>

      <div class="category-copy">
        <h2>{{ activeCategoryContent.title }}</h2>
        <p>
          {{ activeCategoryContent.description }} 
        </p>
      </div>
    </section>

    <section class="players-grid" [class.locked-grid]="isModalOpen">
      <article *ngFor="let player of activePlayers; trackBy: trackPlayer" class="player-card">
        <div class="player-summary">
          <div class="player-image-frame">
            <img [src]="player.image" [alt]="player.name" class="player-image">
          </div>

          <div class="player-info">
            <div class="player-meta">
              <span class="role-pill">{{ player.role }}</span>
              <span *ngIf="player.isWicketkeeper" class="role-pill keeper-pill">WK</span>
            </div>

            <h3>{{ player.name }}</h3>
            <p>{{ player.tagline }}</p>

            <button
              type="button"
              class="stats-btn"
              [disabled]="isModalOpen"
              (click)="openPlayer(player.id)"
            >
              View IPL Stats
            </button>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div *ngIf="selectedPlayer as player" class="modal-backdrop">
    <section class="stats-modal" aria-modal="true" role="dialog">
      <button type="button" class="close-btn" aria-label="Close stats" (click)="closePlayer()">
        x
      </button>

      <div class="modal-layout">
        <div class="modal-player">
          <div class="modal-image-frame">
            <img [src]="player.image" [alt]="player.name" class="modal-image">
          </div>

          <div class="expanded-copy">
            <div class="player-meta">
              <span class="role-pill">{{ player.role }}</span>
              <span *ngIf="player.isWicketkeeper" class="role-pill keeper-pill">WK</span>
            </div>
            <h4>{{ player.name }}</h4>
            <p>{{ player.summary }}</p>
          </div>
        </div>

        <div class="stats-column modal-stats">
          <h5>IPL Snapshot</h5>
          <div class="stats-list">
            <div *ngFor="let stat of player.stats" class="stat-row">
              <span>{{ stat.label }}</span>
              <strong>{{ stat.value }}</strong>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<style>

    display: flex;
    flex-direction: column;
    min-height: 100vh;
    color: white;
    font-family: 'Outfit', Arial, sans-serif;

  }

    inset: 0;

  }

  .logo-container {
    position: absolute;

    left: 20px;

  }

    filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.35));

  }

  }

  .title-text {

    text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);

  }

  .subtitle {

  }

  .back-btn {
    background-color: transparent;
    color: #ffd700;
    border: 2px solid #ffd700;

    border-radius: 999px;
    margin-top: 18px;
    cursor: pointer;
    font-weight: 700;

      transform 0.25s ease,
      background-color 0.25s ease,
      color 0.25s ease;
  }

  .back-btn:hover {
    background-color: #ffd700;
    color: #2a124f;
    transform: translateY(-2px);
  }

  .main-content {
    flex: 1;
    padding: 10px 24px 24px;
  }

  .category-shell {
    width: min(1180px, 100%);
    margin: 0 auto 28px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 28px;
    backdrop-filter: blur(16px);

  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .category-tab {
    border: 1px solid rgba(255, 215, 0, 0.32);
    background: rgba(255, 255, 255, 0.06);
    color: white;
    padding: 12px 18px;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
    transition:
      transform 0.25s ease,
      border-color 0.25s ease,
      background-color 0.25s ease;
  }

  .category-tab.active {
    background: linear-gradient(135deg, #ffd700, #ffb300);
    color: #2a124f;
    border-color: transparent;
    transform: translateY(-2px);
  }

  .category-tab.locked {

  }

  .tab-badge {
    margin-left: 8px;
    font-size: 0.74rem;

  }

  .category-copy h2 {
    margin: 22px 0 8px;

  }

  .category-copy p {
    margin: 0;
    color: rgba(255, 255, 255, 0.84);
    line-height: 1.6;
  }

  .players-grid {
    width: min(1180px, 100%);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 48px 28px;
    align-items: stretch;
  }

  .locked-grid {
    pointer-events: none;
  }

  .player-card {
    height: 100%;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 215, 0, 0.16);
    border-radius: 28px;
    padding: 20px;
    backdrop-filter: blur(14px);
    box-shadow: 0 18px 36px rgba(0, 0, 0, 0.25);
    display: flex;
    transition:
      transform 0.35s ease,
      box-shadow 0.35s ease,
      border-color 0.35s ease;
    overflow: hidden;
  }

  .player-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 215, 0, 0.32);
  }

  .player-summary {
    display: flex;
    align-items: center;
    gap: 18px;
    width: 100%;
    min-height: 190px;
  }

  .player-image-frame {
    width: 118px;
    min-width: 118px;
    height: 136px;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(255, 215, 0, 0.24);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
  }

  .player-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .player-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-self: stretch;
  }

  .player-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    min-height: 52px;
    align-content: flex-start;
  }

  .role-pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;

    text-transform: uppercase;

  .keeper-pill {
    background: rgba(255, 255, 255, 0.12);

  }

  .stats-btn {

    border-radius: 999px;

  }

  .stats-modal {

    width: min(1120px, 92vw);
    min-height: 78vh;
    max-height: 88vh;
    overflow: auto;
    border-radius: 32px;
    border: 1px solid rgba(255, 215, 0, 0.28);

  }

  .close-btn {
    position: absolute;
    top: 22px;
    right: 22px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    color: #ffd700;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1;
    z-index: 2;
  }

  .modal-layout {
    display: grid;
    grid-template-columns: minmax(260px, 0.95fr) minmax(320px, 1.05fr);
    gap: 24px;
    padding: 34px;
    min-height: 100%;
  }

  .modal-player {
    display: grid;
    align-content: start;
    gap: 20px;
  }

  .modal-image-frame {
    width: min(100%, 360px);
    aspect-ratio: 18 / 21;
    border-radius: 28px;
    overflow: hidden;
    border: 1px solid rgba(255, 215, 0, 0.24);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
  }

  .modal-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .expanded-copy {
    max-width: 100%;

  .expanded-copy h4 {

  .expanded-copy p {

      opacity: 1;

  }

  @keyframes modalRise {
    from {
      opacity: 0;
      transform: scale(0.92) translateY(24px);
    }

    to {
      opacity: 1;

  }

  @media (max-width: 720px) {

      align-items: flex-start;
      min-height: auto;
    }

    .player-image-frame {
      width: 100%;
      max-width: 220px;
      height: auto;
      aspect-ratio: 18 / 21;
    }

    .player-meta,
    .player-info h3,
    .player-info p {
      min-height: 0;
    }

    .modal-backdrop {
      padding: 12px;
    }

    .stats-modal {
      width: 100%;
      min-height: 86vh;
      max-height: 86vh;
      border-radius: 26px;
    }

    .modal-layout {
      grid-template-columns: 1fr;
      padding: 22px;
      padding-top: 74px;
    }

    .expanded-copy {
      padding-right: 0;
    }

    .stat-row {
      flex-direction: column;
    }

    .stat-row strong {
      text-align: left;
    }
  }
</style>
