<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="trophyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trophyShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cup body -->
  <path d="M 55 30 L 50 90 Q 50 110 70 115 L 80 118 L 80 140 L 65 145 L 65 155 L 135 155 L 135 145 L 120 140 L 120 118 L 130 115 Q 150 110 150 90 L 145 30 Z" 
        fill="url(#trophyGold)" stroke="#B8860B" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Cup shine -->
  <path d="M 65 35 L 62 85 Q 62 100 75 108 L 80 110 L 80 35 Z" 
        fill="url(#trophyShine)"/>
  
  <!-- Left handle -->
  <path d="M 55 40 Q 25 40 25 65 Q 25 90 55 90" 
        fill="none" stroke="url(#trophyGold)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 55 40 Q 25 40 25 65 Q 25 90 55 90" 
        fill="none" stroke="#B8860B" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Right handle -->
  <path d="M 145 40 Q 175 40 175 65 Q 175 90 145 90" 
        fill="none" stroke="url(#trophyGold)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 145 40 Q 175 40 175 65 Q 175 90 145 90" 
        fill="none" stroke="#B8860B" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Base -->
  <rect x="60" y="155" width="80" height="8" rx="3" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1.5"/>
  <rect x="50" y="163" width="100" height="10" rx="4" fill="url(#trophyGold)" stroke="#B8860B" stroke-width="1.5"/>
  
  <!-- Star on cup -->
  <polygon points="100,50 105,65 120,65 108,74 113,90 100,80 87,90 92,74 80,65 95,65" 
           fill="#FFFACD" stroke="#DAA520" stroke-width="1" filter="url(#glow)"/>
</svg>
